root_path: G:\项目\AutoAI-0.4.7
enable_agents: true
managed_paths: {}
security_defaults:
  network: true
  shell: true
  filesystem:
    read:
    - '*'
    write:
    - '*'
  environment:
    allow:
    - '*'
    request:
    - OPENAI_API_KEY
providers:
  custom:
    base_url: https://api.longcat.chat/openai
    api_key_env: OPENAI_API_KEY
    auth_type: api_key
model:
  provider: custom
  name: LongCat-Flash-Lite
  local_priority: true
adapters:
  remote_llm:
    enabled: true
    dry_run: false
    api_key_env: OPENAI_API_KEY
    base_url: https://api.longcat.chat/openai
    model: LongCat-Flash-Lite
    timeout: 60.0
    temperature: 0.2
    max_tokens: null
autonomous:
  default_level: 5
  max_level: 8
  auto_push: true
  auto_commit: true
  sandbox: optional
  budget_limit: -1
